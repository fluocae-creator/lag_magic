name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify sources compile
        run: python -m compileall src

      - name: Run mock translation workflow
        run: |
          python run_local_mock.py \
            --dialog examples/dialogues.json \
            --personas examples/personas.json \
            --target-lang en
